name: flutter_feedback_kit
description: "In-app user feedback for Flutter — customisable form widget, voice input, offline queue, screenshot capture, and pluggable backends (webhook, Firebase, etc.)."
version: 0.1.1
homepage: https://github.com/SkyWalker2506/flutter_feedback_kit

topics:
  - feedback
  - user-feedback
  - widget
  - form
  - offline
  - utility

environment:
  sdk: ^3.11.3
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.0.0
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.1
  device_info_plus: ">=10.1.2 <12.0.0"
  package_info_plus: ">=8.3.0 <10.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
