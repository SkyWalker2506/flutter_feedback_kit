name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-core:
    name: Publish flutter_feedback_kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Authenticate with pub.dev
        run: |
          mkdir -p ~/.config/dart
          echo '${{ secrets.PUB_CREDENTIALS }}' > ~/.config/dart/pub-credentials.json

      - name: Install dependencies
        run: dart pub get

      - name: Publish
        run: dart pub publish --force

  publish-firebase:
    name: Publish flutter_feedback_kit_firebase
    runs-on: ubuntu-latest
    needs: publish-core
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Authenticate with pub.dev
        run: |
          mkdir -p ~/.config/dart
          echo '${{ secrets.PUB_CREDENTIALS }}' > ~/.config/dart/pub-credentials.json

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Replace path dependency with hosted dependency
        working-directory: packages/flutter_feedback_kit_firebase
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python3 -c "
          import re, pathlib, os
          p = pathlib.Path('pubspec.yaml')
          content = p.read_text()
          version = os.environ['VERSION']
          content = re.sub(
            r'flutter_feedback_kit:\s*\n\s*path:\s*\.\./\.\.',
            f'flutter_feedback_kit: ^{version}',
            content
          )
          p.write_text(content)
          "
          echo "--- pubspec.yaml after patch ---"
          cat pubspec.yaml

      - name: Install dependencies
        working-directory: packages/flutter_feedback_kit_firebase
        run: dart pub get

      - name: Publish
        working-directory: packages/flutter_feedback_kit_firebase
        run: dart pub publish --force
